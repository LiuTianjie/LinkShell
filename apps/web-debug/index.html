<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkShell — Debug Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b1020; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #111827; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
    #top-bar h1 { font-size: 16px; font-weight: 600; color: #f8fafc; }
    #status-badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; background: #1e293b; color: #94a3b8; }
    #status-badge.connected { background: #064e3b; color: #6ee7b7; }
    #status-badge.reconnecting { background: #78350f; color: #fcd34d; }
    #status-badge.error { background: #7f1d1d; color: #fca5a5; }

    #connect-panel { padding: 16px; background: #111827; border-bottom: 1px solid #1e293b; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; flex-shrink: 0; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .field input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #f8fafc; padding: 6px 10px; font-size: 13px; outline: none; }
    .field input:focus { border-color: #3b82f6; }
    button { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.secondary { background: #475569; }
    button.danger { background: #dc2626; }

    #terminal-container { flex: 1; padding: 4px; overflow: hidden; }

    #debug-panel { background: #111827; border-top: 1px solid #1e293b; padding: 10px 16px; font-size: 12px; color: #64748b; display: flex; gap: 20px; flex-wrap: wrap; flex-shrink: 0; max-height: 80px; overflow-y: auto; }
    .debug-item { display: flex; gap: 6px; }
    .debug-label { color: #475569; }
    .debug-value { color: #93c5fd; font-family: monospace; }
  </style>
</head>
<body>
  <div id="top-bar">
    <h1>LinkShell Debug</h1>
    <span id="status-badge">disconnected</span>
  </div>

  <div id="connect-panel">
    <div class="field">
      <label>Gateway</label>
      <input id="gateway-url" value="http://localhost:8787" style="width:220px" />
    </div>
    <div class="field">
      <label>Pairing Code</label>
      <input id="pairing-code" maxlength="6" placeholder="6 digits" style="width:100px" />
    </div>
    <button id="btn-claim">Claim</button>
    <div class="field">
      <label>Session ID</label>
      <input id="session-id" placeholder="or paste session ID" style="width:280px" />
    </div>
    <button id="btn-connect" class="secondary">Connect</button>
    <button id="btn-disconnect" class="danger" disabled>Disconnect</button>
  </div>

  <div id="terminal-container"></div>

  <div id="debug-panel">
    <div class="debug-item"><span class="debug-label">Session:</span><span class="debug-value" id="dbg-session">—</span></div>
    <div class="debug-item"><span class="debug-label">Seq:</span><span class="debug-value" id="dbg-seq">—</span></div>
    <div class="debug-item"><span class="debug-label">ACK:</span><span class="debug-value" id="dbg-ack">—</span></div>
    <div class="debug-item"><span class="debug-label">Controller:</span><span class="debug-value" id="dbg-controller">—</span></div>
    <div class="debug-item"><span class="debug-label">Latency:</span><span class="debug-value" id="dbg-latency">—</span></div>
    <div class="debug-item"><span class="debug-label">Messages:</span><span class="debug-value" id="dbg-messages">0</span></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
