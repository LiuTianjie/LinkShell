name: linkshell-gateway
image: nickname4th/linkshell-gateway:0.4.33
region: cn
exposure: cn-edge
domain: gateway.itool.tech
port: 8787
publishPort: 8787
replicas: 1
env:
  PORT: "8787"
  AUTH_REQUIRED: "true"
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
healthcheck:
  test:
    - CMD
    - wget
    - -qO-
    - http://127.0.0.1:8787/healthz
  interval: 10s
  timeout: 3s
  retries: 3
  start_period: 10s
