services:
  gateway:
    image: linkshell-gateway
    container_name: linkshell-gateway
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    ports:
      - "${PORT:-8787}:8787"
    environment:
      - PORT=8787
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
