services:
  gateway:
    image: nickname4th/linkshell-gateway:latest
    container_name: linkshell-gateway
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    ports:
      - "${PORT:-8787}:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
